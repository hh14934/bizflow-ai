services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bizflow-ai-postgres
    environment:
      POSTGRES_DB: bizflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: bizflow-ai-redis
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    container_name: bizflow-ai-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
  prometheus:
    image: prom/prometheus:latest
    container_name: bizflow-ai-prometheus
    ports:
      - "9090:9090"
volumes:
  postgres_data:
